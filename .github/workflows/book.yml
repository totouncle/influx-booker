name: Influx Auto Booker

on:
  schedule:
    # 월/화/수 19:30 클래스 (NZDT: UTC 06:15, NZST: UTC 07:15)
    - cron: '15 6 * * 1,2,3'
    - cron: '15 7 * * 1,2,3'
    # 일 Yoga 11:15 (NZDT: UTC 토 22:00, NZST: UTC 토 23:00)
    - cron: '0 22 * * 6'
    - cron: '0 23 * * 6'
    # 일 Pilates 16:00 (NZDT: UTC 일 02:45, NZST: UTC 일 03:45)
    - cron: '45 2 * * 0'
    - cron: '45 3 * * 0'
  workflow_dispatch:

jobs:
  book:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run booker
        run: node book.js
        env:
          INFLUX_TOKEN_1: ${{ secrets.INFLUX_TOKEN_1 }}
          INFLUX_TOKEN_2: ${{ secrets.INFLUX_TOKEN_2 }}
          TZ: Pacific/Auckland

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="❌ InfluxBooker 실패: $(date '+%Y-%m-%d %a')"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
