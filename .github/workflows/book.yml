name: Influx Auto Booker

on:
  schedule:
    # 90분 전 발동 → GitHub 지연(~50분) 감안해도 오픈 전 도착, 코드가 정확한 시각까지 대기
    # 토 07:15 NZT → 일요일 클래스 트리거 dayOfWeek:6 (NZDT: UTC 금 18:15, NZST: UTC 금 19:15)
    - cron: '15 18 * * 5'
    - cron: '15 19 * * 5'
    # 일 07:15 NZT → 월요일 클래스 트리거 dayOfWeek:0 (NZDT: UTC 토 18:15, NZST: UTC 토 19:15)
    - cron: '15 18 * * 6'
    - cron: '15 19 * * 6'
    # 수 10:00 NZT → Mobility 11:30 오픈 대기 (NZDT: UTC 화 21:00, NZST: UTC 화 22:00)
    - cron: '0 21 * * 2'
    - cron: '0 22 * * 2'
    # 수 17:15 NZT → Yoga Muni 18:45 오픈 대기 (NZDT: UTC 수 04:15, NZST: UTC 수 05:15)
    - cron: '15 4 * * 3'
    - cron: '15 5 * * 3'
    # 월~금 07:30 NZT → 아침 클래스 오픈 대기 (NZDT: UTC 전날 18:30, NZST: UTC 전날 19:30)
    - cron: '30 18 * * 0,1,2,3,4'
    - cron: '30 19 * * 0,1,2,3,4'
    # 금 06:00 NZT → Circuit 45 HIIT 07:30 오픈 대기 dayOfWeek:5 (NZDT: UTC 목 17:00, NZST: UTC 목 18:00)
    - cron: '0 17 * * 4'
    - cron: '0 18 * * 4'
    # 목 16:15 NZT → Pilates 17:45 오픈 대기 dayOfWeek:4 (NZDT: UTC 목 03:15, NZST: UTC 목 04:15)
    - cron: '15 3 * * 4'
    - cron: '15 4 * * 4'
    # 일/월/화 18:00 NZT → 19:30 저녁 클래스 오픈 대기 (NZDT: UTC 05:00, NZST: UTC 06:00)
    - cron: '0 5 * * 0,1,2'
    - cron: '0 6 * * 0,1,2'
  workflow_dispatch:

jobs:
  book:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run booker
        run: node book.js
        env:
          INFLUX_TOKEN_1: ${{ secrets.INFLUX_TOKEN_1 }}
          INFLUX_TOKEN_2: ${{ secrets.INFLUX_TOKEN_2 }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          TZ: Pacific/Auckland

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="❌ InfluxBooker 실패: $(TZ=Pacific/Auckland date '+%Y-%m-%d %a %H:%M')"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
