name: Influx Auto Booker

on:
  schedule:
    # 일 09:30 Aqua deep (NZDT: UTC 토 20:15, NZST: UTC 토 21:15)
    - cron: '15 20 * * 6'
    - cron: '15 21 * * 6'
    # 일/월/화 19:30 트리거 → 월/화/수 클래스 (NZDT: UTC 06:15, NZST: UTC 07:15)
    - cron: '15 6 * * 0,1,2'
    - cron: '15 7 * * 0,1,2'
  workflow_dispatch:

jobs:
  book:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run booker
        run: node book.js
        env:
          INFLUX_TOKEN_1: ${{ secrets.INFLUX_TOKEN_1 }}
          INFLUX_TOKEN_2: ${{ secrets.INFLUX_TOKEN_2 }}
          TZ: Pacific/Auckland

      - name: Notify on success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="✅ InfluxBooker 완료: $(TZ=Pacific/Auckland date '+%Y-%m-%d %a %H:%M')"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="❌ InfluxBooker 실패: $(TZ=Pacific/Auckland date '+%Y-%m-%d %a %H:%M')"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
